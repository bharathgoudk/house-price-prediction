<!DOCTYPE html>
<html>
<head>
    <title>House Price Prediction</title>
</head>
<body>

<h2>House Price Prediction</h2>

<form action="/predict" method="post">
    <input type="number" name="Square_Footage" placeholder="Square Footage" required><br>
    <input type="number" name="Num_Bedrooms" placeholder="Bedrooms" required><br>
    <input type="number" name="Num_Bathrooms" placeholder="Bathrooms" required><br>
    <input type="number" name="Year_Built" placeholder="Year Built" required><br>
    <input type="number" step="0.1" name="Lot_Size" placeholder="Lot Size" required><br>
    <input type="number" name="Garage_Size" placeholder="Garage Size" required><br>
    <input type="number" name="Neighborhood_Quality" placeholder="Neighborhood Quality" required><br>

    <button type="submit">Predict</button>
</form>

<h3>{{ prediction_text }}</h3>

</body>
</html>
