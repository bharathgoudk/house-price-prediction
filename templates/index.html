<!DOCTYPE html>
<html>
<head>
    <title>House Price Predictor</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            padding: 50px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background: #4facfe;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }

        h2 {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🏠 House Price Predictor</h2>

    <form action="/predict" method="post">

        <input type="number" name="Square_Footage" placeholder="Square Footage" required>
        <input type="number" name="Num_Bedrooms" placeholder="Bedrooms" required>
        <input type="number" name="Num_Bathrooms" placeholder="Bathrooms" required>
        <input type="number" name="Year_Built" placeholder="Year Built" required>
        <input type="number" step="0.1" name="Lot_Size" placeholder="Lot Size" required>
        <input type="number" name="Garage_Size" placeholder="Garage Size" required>
        <input type="number" name="Neighborhood_Quality" placeholder="Neighborhood Quality" required>

        <button type="submit">Predict Price</button>
    </form>
</div>

</body>
</html>
<h3>{{ prediction_text }}</h3>
